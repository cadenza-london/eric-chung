// ============================================================
// PIANO AUDIO ENGINE
// ============================================================
function useAudioEngine() {
  const ctxRef = useRef(null);
  function getCtx() {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    if (ctxRef.current.state === "suspended") ctxRef.current.resume();
    return ctxRef.current;
  }
  function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

  function playPianoNote(freq, startTime, duration, volume = 0.55) {
    const ctx = getCtx();
    const master = ctx.createGain();
    master.gain.value = 1;
    const conv = ctx.createConvolver();
    const rLen = ctx.sampleRate * 1.5;
    const rBuf = ctx.createBuffer(2, rLen, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = rBuf.getChannelData(ch);
      for (let i = 0; i < rLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/rLen, 2.5);
    }
    conv.buffer = rBuf;
    const rGain = ctx.createGain(); rGain.gain.value = 0.18;
    master.connect(ctx.destination); master.connect(conv); conv.connect(rGain); rGain.connect(ctx.destination);
    [[1,1.0],[2,0.5],[3,0.25],[4,0.12],[5,0.06],[6,0.03]].forEach(([mult,vol]) => {
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.connect(g); g.connect(master);
      osc.type = mult===1?"triangle":"sine";
      osc.frequency.setValueAtTime(freq*mult, startTime);
      const pk = volume*vol*0.7;
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(pk, startTime+0.008);
      g.gain.exponentialRampToValueAtTime(pk*0.6, startTime+0.1);
      g.gain.exponentialRampToValueAtTime(pk*0.3, startTime+0.4);
      g.gain.exponentialRampToValueAtTime(0.0001, startTime+duration+0.5);
      osc.start(startTime); osc.stop(startTime+duration+0.6);
    });
    const nLen = Math.floor(ctx.sampleRate*0.025);
    const nBuf = ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,3);
    const ns=ctx.createBufferSource(); const ng=ctx.createGain();
    ns.buffer=nBuf; ng.gain.setValueAtTime(volume*0.08,startTime); ng.gain.linearRampToValueAtTime(0,startTime+0.025);
    ns.connect(ng); ng.connect(master); ns.start(startTime);
    return startTime+duration+0.05;
  }

  function playPitch(midi1, midi2, onDone) {
    const ctx = getCtx(); const t = ctx.currentTime+0.1;
    const t2 = playPianoNote(midiToFreq(midi1), t, 0.9);
    playPianoNote(midiToFreq(midi2), t2+0.25, 0.9);
    setTimeout(onDone, (t2+0.25+1.1-ctx.currentTime)*1000+300);
  }
  function playMelody(midis, onDone) {
    const ctx = getCtx(); let t = ctx.currentTime+0.1;
    for (const m of midis) { t = playPianoNote(midiToFreq(m), t, 0.5)+0.08; }
    setTimeout(onDone, (t-ctx.currentTime)*1000+400);
  }
  function playTexture(midis, onDone) {
    const ctx = getCtx(); const t = ctx.currentTime+0.1;
    midis.forEach((m,i) => playPianoNote(midiToFreq(m), t+i*0.018, 2.4, 0.52));
    setTimeout(onDone, 3400);
  }
  function playRhythm(pattern, onDone, withCountIn = false) {
    const ctx = getCtx();
    const WIN = 0.55; // beat window, matches genRhythmQuestion

    // ── Bass drum (accent / downbeat) ──────────────────────────────────────
    function bassDrum(when) {
      const dur = 0.35;
      const len = Math.floor(ctx.sampleRate * dur);
      // Oscillator-based kick: pitch sweeps 180Hz → 50Hz
      const osc = ctx.createOscillator();
      const oscGain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(180, when);
      osc.frequency.exponentialRampToValueAtTime(50, when + 0.12);
      oscGain.gain.setValueAtTime(0, when);
      oscGain.gain.linearRampToValueAtTime(1.0, when + 0.004);
      oscGain.gain.exponentialRampToValueAtTime(0.001, when + dur);
      osc.connect(oscGain); oscGain.connect(ctx.destination);
      osc.start(when); osc.stop(when + dur + 0.01);
      // Add click transient
      const cLen = Math.floor(ctx.sampleRate * 0.008);
      const cBuf = ctx.createBuffer(1, cLen, ctx.sampleRate);
      const cd = cBuf.getChannelData(0);
      for (let i = 0; i < cLen; i++) cd[i] = (Math.random()*2-1) * (1 - i/cLen);
      const cs = ctx.createBufferSource(); const cg = ctx.createGain();
      cs.buffer = cBuf; cg.gain.setValueAtTime(0.6, when);
      cs.connect(cg); cg.connect(ctx.destination); cs.start(when);
    }

    // ── Snare / hi-hat (subdivision / off-beat) ───────────────────────────
    function snare(when, isSubdivision = false) {
      // Noise burst shaped like snare
      const dur = isSubdivision ? 0.05 : 0.12;
      const len = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, isSubdivision ? 6 : 3);
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = isSubdivision ? 3000 : 1500;
      src.buffer = buf;
      src.connect(hp); hp.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(isSubdivision ? 0.45 : 0.75, when);
      src.start(when);
      // Add small body tone for snare (not subdivision)
      if (!isSubdivision) {
        const osc = ctx.createOscillator(); const og = ctx.createGain();
        osc.type = "triangle"; osc.frequency.value = 220;
        og.gain.setValueAtTime(0.3, when); og.gain.exponentialRampToValueAtTime(0.001, when + 0.08);
        osc.connect(og); og.connect(ctx.destination); osc.start(when); osc.stop(when + 0.09);
      }
    }

    // ── Count-in metronome tick ───────────────────────────────────────────
    function tick(when, isDownbeat = false) {
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = isDownbeat ? 1200 : 900;
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(0.4, when + 0.003);
      g.gain.exponentialRampToValueAtTime(0.001, when + 0.06);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(when); osc.stop(when + 0.07);
    }

    // ── Play a hit: choose drum sound based on accent + position ─────────
    function playHit(when, accent, isSubdivision) {
      if (accent)          bassDrum(when);
      else if (isSubdivision) snare(when, true);
      else                 snare(when, false);
    }

    let startOffset = 0;

    if (withCountIn) {
      // 4-beat count-in at same tempo (WIN seconds per beat)
      for (let i = 0; i < 4; i++) tick(ctx.currentTime + 0.1 + i * WIN, i === 0);
      startOffset = 4 * WIN + 0.08; // small gap after count-in
    }

    const base = ctx.currentTime + 0.1 + startOffset;
    pattern.hits.forEach(h => {
      // Determine if this hit is a subdivision (non-accent, offset > 0)
      const isSub = !h.accent && h.time % WIN > 0.01;
      playHit(base + h.time, h.accent, isSub);
    });

    const totalTime = startOffset + pattern.totalDur;
    setTimeout(onDone, totalTime * 1000 + 300);
  }
  return { playPitch, playMelody, playTexture, playRhythm };
}

// ============================================================
// QUESTION GENERATORS — LEVEL-AWARE
// ============================================================
function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function randChoice(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// PITCH
// Easy:   diff >= 5 semitones (very obvious)
// Medium: diff 2–4 semitones
// Hard:   diff 1–2 semitones (semitone/tone only)
function genPitchQuestion(level = "Medium") {
  const midi1 = randInt(52, 76);
  let diffs;
  if (level === "Easy")        diffs = [-8,-7,-6,-5,5,6,7,8,0,0,0]; // ~27% same
  else if (level === "Medium") diffs = [-4,-3,-2,2,3,4,0,0];
  else                         diffs = [-2,-1,1,2,0];                // Hard: tight
  const diff = randChoice(diffs);
  const midi2 = Math.max(40, Math.min(84, midi1+diff));
  return { midi1, midi2, answer: diff>0?"higher":diff<0?"lower":"same" };
}

// MELODY
// Easy:   change is at note 1 or 5 (edge), delta ±3–4
// Medium: any note, delta ±2
// Hard:   any note, delta ±1 (semitone); "same" rate lowered to ~20%
function genMelodyQuestion(level = "Medium") {
  const root = randInt(55, 68);
  const scale = [0,2,4,5,7,9,11,12];
  const notes = Array.from({length:5}, () => root+randChoice(scale));
  let changed, delta;
  if (level === "Easy") {
    changed = Math.random()>0.3 ? randChoice([0,4]) : null; // edge notes or same
    delta = randChoice([-4,-3,3,4]);
  } else if (level === "Medium") {
    changed = Math.random()>0.3 ? randInt(0,4) : null;
    delta = randChoice([-2,2]);
  } else {
    changed = Math.random()>0.2 ? randInt(0,4) : null; // only ~20% same
    delta = randChoice([-1,1]);
  }
  const notes2 = [...notes];
  if (changed !== null) notes2[changed] = Math.max(48, Math.min(84, notes[changed]+delta));
  return { notes1: notes, notes2, answer: changed===null?"same":String(changed+1) };
}

// TEXTURE
// Easy:   only 2 vs 4 (maximum contrast), open voicings
// Medium: 2, 3, 4 — standard voicings
// Hard:   2, 3, 4 — dense/close voicings, narrower range
function genTextureQuestion(level = "Medium") {
  let count;
  if (level === "Easy")        count = randChoice([2,4]);
  else                         count = randInt(2,4);

  const voicings = {
    easy: {
      2: [[0,12],[0,14],[0,16]],                           // wide octave+ spacing
      4: [[0,4,7,12],[0,5,9,14],[0,3,7,12]],
    },
    normal: {
      2: [[0,5],[0,7],[0,4],[0,8],[0,9],[0,3]],
      3: [[0,4,7],[0,3,7],[0,4,8],[0,5,9],[0,3,6],[0,4,9]],
      4: [[0,4,7,11],[0,3,7,10],[0,4,7,10],[0,2,7,9]],
    },
    hard: {
      2: [[0,2],[0,3],[0,1]],                              // close intervals
      3: [[0,1,3],[0,2,4],[0,1,4],[0,2,5]],
      4: [[0,1,3,5],[0,2,3,5],[0,1,2,4],[0,2,4,6]],
    },
  };
  const set = level==="Easy" ? voicings.easy : level==="Hard" ? voicings.hard : voicings.normal;
  const root = level==="Hard" ? randInt(55,68) : randInt(48,62); // Hard: mid-range (harder to distinguish)
  const intervals = randChoice(set[count] || voicings.normal[count]);
  return { midis: intervals.map(i=>root+i), count, answer: String(count) };
}

// RHYTHM beat types by level
// Easy:   quarter vs two-eighths only (maximum rhythmic contrast)
// Medium: adds dotted + triplet
// Hard:   all types including syncopation + sixteenths; changed beat biased to beats 2/3
const BEAT_POOL = {
  Easy:   ["q","ee"],
  Medium: ["q","ee","dot","tri"],
  Hard:   ["q","ee","dot","tri","syn","3+1"],
};
const BEAT_DEFS = {
  q:   { hits: [{ o:0, a:true }] },
  ee:  { hits: [{ o:0,a:true},{o:0.5,a:false}] },
  dot: { hits: [{ o:0,a:true},{o:0.67,a:false}] },
  tri: { hits: [{ o:0,a:true},{o:0.33,a:false},{o:0.67,a:false}] },
  syn: { hits: [{ o:0.25,a:false},{o:0.75,a:false}] },
  "3+1": { hits: [{ o:0,a:true},{o:0.25,a:false},{o:0.5,a:false},{o:0.75,a:false}] },
};

function genRhythmQuestion(level = "Medium") {
  const WIN = 0.55;
  const pool = BEAT_POOL[level];

  function randomBeat(exclude=[]) {
    const avail = pool.filter(id => !exclude.includes(id));
    const id = randChoice(avail.length ? avail : pool);
    return { id, ...BEAT_DEFS[id] };
  }

  // Beat 0 always has clear accent, no syncopation for orientation
  const safeFirst = pool.filter(id => id !== "syn");
  const firstId = randChoice(safeFirst);
  const p1 = [
    { id: firstId, ...BEAT_DEFS[firstId] },
    randomBeat(), randomBeat(), randomBeat(),
  ];

  // Whether to change, and which beat
  const doChange = Math.random() > 0.3;
  let changed = null;
  if (doChange) {
    // Hard: bias change to beats 2 or 3 (middle, harder to catch)
    changed = level==="Hard" ? randChoice([1,1,2,2,0,3]) : randInt(0,3);
  }

  const p2 = [...p1];
  if (changed !== null) p2[changed] = randomBeat([p1[changed].id]);

  function toPlayable(beats) {
    const hits = [];
    beats.forEach((bt,i) => bt.hits.forEach(h => hits.push({ time: i*WIN+h.o*WIN, accent: h.a })));
    return { hits, totalDur: 4*WIN+0.35 };
  }

  return {
    beatTypes1: p1, beatTypes2: p2,
    pattern1: toPlayable(p1), pattern2: toPlayable(p2),
    answer: changed===null ? "same" : String(changed+1),
  };
}

// ============================================================
// FEEDBACK TOAST
// ============================================================
const CORRECT_MSGS = ["Excellent!", "Perfect!", "Spot on!", "Well done!", "Brilliant!", "Correct!"];
const WRONG_MSGS   = ["Not quite", "Try again", "Close!", "Keep going", "Almost!"];

function FeedbackToast({ correct, streak, visible }) {
  if (!visible) return null;
  const isCorrect = correct;
  const emoji  = isCorrect
    ? (streak >= 5 ? "🔥" : streak >= 3 ? "⭐" : "✓")
    : (streak === 0 ? "✗" : "○");
  const label  = isCorrect
    ? CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)]
    : WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
  const color  = isCorrect ? "#7ab87a" : "#c97a7a";
  const streakMsg = isCorrect && streak >= 2 ? `${streak} in a row!` : null;

  return (
    <div className="feedback-wrap">
      <div className="feedback-toast">
        <div className="feedback-emoji">{emoji}</div>
        <div className="feedback-label" style={{color}}>{label}</div>
        {streakMsg && <div className="feedback-streak" style={{color:"#c9a84c"}}>{streakMsg}</div>}
      </div>
    </div>
  );
}

// STARS
// ============================================================
function Stars() {
  const stars = Array.from({length:50},(_,i)=>({
    id:i, top:Math.random()*100, left:Math.random()*100,
    size:Math.random()*1.8+0.8, dur:(Math.random()*4+2).toFixed(1),
    op:(Math.random()*0.3+0.1).toFixed(2), delay:(Math.random()*5).toFixed(1),
    gold: Math.random()>0.5,
  }));
  return <div className="bg-stars">{stars.map(s=>(
    <div key={s.id} className="star" style={{top:`${s.top}%`,left:`${s.left}%`,width:s.size,height:s.size,"--d":`${s.dur}s`,"--o":s.op,animationDelay:`${s.delay}s`,background:s.gold?"#c9a84c":"#f0e6d0"}}/>
  ))}</div>;
}

function ListeningBars({ color }) {
  return <div className="listening-indicator">{[0.7,1.1,0.5,1.3,0.8].map((d,i)=>(
    <div key={i} className="bar" style={{"--d":`${d}s`,background:color,animationDelay:`${i*0.08}s`}}/>
  ))}</div>;
}

// AUTH
// ============================================================
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit() {
    if (!username.trim() || !password.trim()) { setError("Please fill in all fields."); return; }
    setLoading(true); setError("");
    const users = await getUsers();
    if (mode === "login") {
      const u = users[username.toLowerCase()];
      if (!u || u.password !== password) { setError("Incorrect username or password."); setLoading(false); return; }
      onLogin({ username: username.toLowerCase(), isAdmin: !!u.isAdmin });
    } else {
      if (users[username.toLowerCase()]) { setError("Username already taken."); setLoading(false); return; }
      if (password.length < 4) { setError("Password must be at least 4 characters."); setLoading(false); return; }
      users[username.toLowerCase()] = { password, isAdmin: false };
      await saveUsers(users);
      onLogin({ username: username.toLowerCase(), isAdmin: false });
    }
    setLoading(false);
  }

  return (
    <div className="card fade-in" style={{maxWidth:400}}>
      <div className="card-inner">
        <div className="card-title">Music Aptitude</div>
        <div className="ornament"><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
        <div className="card-sub">Practise your school music aptitude test — Pitch, Melody, Texture &amp; Rhythm.</div>
        <div className="tab-row">
          <button className={`tab ${mode==="login"?"active":""}`} onClick={()=>{setMode("login");setError("");}}>Sign In</button>
          <button className={`tab ${mode==="register"?"active":""}`} onClick={()=>{setMode("register");setError("");}}>Register</button>
        </div>
        <input className="mat-input" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
        <input className="mat-input" placeholder="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />
        {error && <div className="error-msg">{error}</div>}
        <button className="mat-btn btn-primary" style={{width:"100%",marginTop:14}} onClick={submit} disabled={loading}>
          {loading ? "..." : mode==="login" ? "Sign In" : "Create Account"}
        </button>
        {mode==="login" && <div style={{fontSize:11,color:G.muted,textAlign:"center",marginTop:10}}>Admin: admin / admin123</div>}
      </div>
    </div>
  );
}

// PITCH SECTION
// ============================================================
function PitchSection({ onDone, onHome, isFullTest, ftSectionIdx, stat, onAnswer, onReset, initialLevel }) {
  const audio = useAudioEngine();
  const TOTAL = SECTIONS.find(x=>x.id==="pitch").total;
  const [level, setLevel] = useState(initialLevel||"Medium");
  const [questions, setQuestions] = useState(()=>Array.from({length:TOTAL},()=>genPitchQuestion(initialLevel||"Medium")));
  const [qIdx,setQIdx] = useState(0);
  const [playing,setPlaying] = useState(false);
  const [played,setPlayed] = useState(false);
  const [selected,setSelected] = useState(null);
  const [revealed,setRevealed] = useState(false);
  const [correct,setCorrect] = useState(0);
  const [feedback,setFeedback] = useState(null); // {ok, streak}
  const q = questions[qIdx];
  const sc = SECTIONS[0].color;

  function changeLevel(l) {
    setLevel(l);
    setQuestions(Array.from({length:TOTAL},()=>genPitchQuestion(l)));
    setQIdx(0); setSelected(null); setRevealed(false); setPlayed(false); setCorrect(0); setFeedback(null);
  }
  function play() { setPlaying(true); audio.playPitch(q.midi1,q.midi2,()=>{ setPlaying(false); setPlayed(true); }); }
  function choose(c) {
    if(revealed)return;
    const ok=c===q.answer;
    setSelected(c); setRevealed(true);
    const newCorrect = ok ? correct+1 : correct;
    if(ok) setCorrect(newCorrect);
    const newStreak = ok ? (stat?.streak||0)+1 : 0;
    setFeedback({ok, streak: newStreak});
    onAnswer&&onAnswer(ok);
  }
  function next() {
    setFeedback(null);
    if(qIdx<TOTAL-1){ setQIdx(x=>x+1); setSelected(null); setRevealed(false); setPlayed(false); } else onDone(correct);
  }

  return (
    <QuestionCard section="pitch" qIdx={qIdx} total={TOTAL} level={level} onHome={onHome} isFullTest={isFullTest} ftSectionIdx={ftSectionIdx} stat={stat} onReset={onReset}>
      {!isFullTest && <LevelSelector level={level} onChange={changeLevel}/>}
      <div className="ornament"><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
      <div className="card-sub">Two notes played one after the other — is the second note higher, lower, or the same?</div>
      <button className="play-btn" style={{"--sc":sc}} onClick={play} disabled={playing}>
        {playing?<><ListeningBars color={sc}/>&nbsp;Listening...</>:<><span>▶</span> Play Notes</>}
      </button>
      <FeedbackToast correct={feedback?.ok} streak={feedback?.streak} visible={!!feedback}/>
      {["higher","same","lower"].map(c=>(
        <button key={c} className={`mat-btn btn-answer ${selected===c?"selected":""} ${revealed&&c===q.answer?"correct":""} ${revealed&&selected===c&&c!==q.answer?"wrong":""}`}
          onClick={()=>choose(c)} disabled={!played}>
          {c.charAt(0).toUpperCase()+c.slice(1)}
        </button>
      ))}
      {revealed&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <button className="mat-btn btn-primary" onClick={next}>{qIdx<TOTAL-1?"Next Question":isFullTest?"Next Section →":"See Results"}</button>
      </div>}
    </QuestionCard>
  );
}

  function changeLevel(l) {
    setLevel(l);
    setQuestions(Array.from({length:TOTAL},()=>genMelodyQuestion(l)));

  function choose(v){
    if(revealed)return;
    const ok=v===q.answer;
    setSelected(v); setRevealed(true);
    if(ok) setCorrect(x=>x+1);
    setFeedback({ok, streak: ok?(stat?.streak||0)+1:0});
    onAnswer&&onAnswer(ok);
  }
  function next(){
    setFeedback(null);
    if(qIdx<TOTAL-1){ setQIdx(x=>x+1); setPhase(0); setSelected(null); setRevealed(false); } else onDone(correct);
  }

  return (
    <QuestionCard section="melody" qIdx={qIdx} total={TOTAL} level={level} onHome={onHome} isFullTest={isFullTest} ftSectionIdx={ftSectionIdx} stat={stat} onReset={onReset}>

        <button className="play-btn" style={{"--sc":sc,marginBottom:0}} onClick={play1} disabled={playing}>
          {playing&&phase===0?<ListeningBars color={sc}/>:<><span>▶</span> Play 1st</>}
        </button>
        <button className="play-btn" style={{"--sc":sc,marginBottom:0,opacity:phase<1?0.4:1}} onClick={play2} disabled={playing||phase<1}>
          {playing&&phase>=1?<ListeningBars color={sc}/>:<><span>▶</span> Play 2nd</>}
        </button>
      </div>
      <FeedbackToast correct={feedback?.ok} streak={feedback?.streak} visible={!!feedback}/>
      {["same","1","2","3","4","5"].map(v=>(
        <button key={v} className={`mat-btn btn-answer ${selected===v?"selected":""} ${revealed&&v===q.answer?"correct":""} ${revealed&&selected===v&&v!==q.answer?"wrong":""}`}
          onClick={()=>choose(v)} disabled={phase<2}>
          {v==="same"?"Same":`Note ${v}`}
        </button>
      ))}
      {revealed&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <button className="mat-btn btn-primary" onClick={next}>{qIdx<TOTAL-1?"Next Question":isFullTest?"Next Section →":"See Results"}</button>
      </div>}
    </QuestionCard>

        {playing?<><ListeningBars color={sc}/>&nbsp;Listening...</>:<><span>▶</span> Play Chord</>}
      </button>
      <FeedbackToast correct={feedback?.ok} streak={feedback?.streak} visible={!!feedback}/>
      {["2","3","4"].map(c=>(
        <button key={c} className={`mat-btn btn-answer ${selected===c?"selected":""} ${revealed&&c===String(q.count)?"correct":""} ${revealed&&selected===c&&c!==String(q.count)?"wrong":""}`}
          onClick={()=>choose(c)} disabled={!played}>
          {c} notes
        </button>
      ))}
      {revealed&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <button className="mat-btn btn-primary" onClick={next}>{qIdx<TOTAL-1?"Next Question":isFullTest?"Next Section →":"See Results"}</button>
      </div>}
    </QuestionCard>
  );
}

// ============================================================
// RHYTHM SECTION
// ============================================================
function RhythmSection({ onDone, onHome, isFullTest, ftSectionIdx, stat, onAnswer, onReset, initialLevel }) {
  const audio = useAudioEngine();
  const TOTAL = SECTIONS.find(x=>x.id==="rhythm").total;
  const [level, setLevel] = useState(initialLevel||"Medium");
  const [questions, setQuestions] = useState(()=>Array.from({length:TOTAL},()=>genRhythmQuestion(initialLevel||"Medium")));
  const [qIdx,setQIdx] = useState(0);
  const [phase,setPhase] = useState(0);
  const [playing,setPlaying] = useState(false);
  const [countIn,setCountIn] = useState(false);
  const [selected,setSelected] = useState(null);
  const [revealed,setRevealed] = useState(false);
  const [correct,setCorrect] = useState(0);
  const [feedback,setFeedback] = useState(null);
  const q = questions[qIdx];
  const sc = SECTIONS[3].color;
  const WIN = 0.55;

  function changeLevel(l) {
    setLevel(l);
    setQuestions(Array.from({length:TOTAL},()=>genRhythmQuestion(l)));
    setQIdx(0); setPhase(0); setSelected(null); setRevealed(false); setCorrect(0);
  }
  function play1(){
    setPlaying(true); setCountIn(true);
    setTimeout(()=>setCountIn(false), WIN*4*1000+100);
    audio.playRhythm(q.pattern1,()=>{ setPlaying(false); setPhase(1); }, true);
  }
  function play2(){
    setPlaying(true); setCountIn(true);
    setTimeout(()=>setCountIn(false), WIN*4*1000+100);
    audio.playRhythm(q.pattern2,()=>{ setPlaying(false); setPhase(2); }, true);
  }
  function choose(v){
    if(revealed)return;
    const ok=v===q.answer;
    setSelected(v); setRevealed(true);
    if(ok) setCorrect(x=>x+1);
    setFeedback({ok, streak: ok?(stat?.streak||0)+1:0});
    onAnswer&&onAnswer(ok);
  }
  function next(){
    setFeedback(null);
    if(qIdx<TOTAL-1){ setQIdx(x=>x+1); setPhase(0); setSelected(null); setRevealed(false); } else onDone(correct);
  }

  return (
    <QuestionCard section="rhythm" qIdx={qIdx} total={TOTAL} level={level} onHome={onHome} isFullTest={isFullTest} ftSectionIdx={ftSectionIdx} stat={stat} onReset={onReset}>
      {!isFullTest && <LevelSelector level={level} onChange={changeLevel}/>}
      <div className="ornament"><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
      <div className="card-sub">A 4-beat rhythm played twice — same both times, or which beat was different?</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <button className="play-btn" style={{"--sc":sc,marginBottom:0}} onClick={play1} disabled={playing}>
          {playing&&phase===0?<><ListeningBars color={sc}/>&nbsp;{countIn?"1·2·3·4·▶":"Playing..."}</>:<><span>▶</span> Play 1st</>}
        </button>
        <button className="play-btn" style={{"--sc":sc,marginBottom:0,opacity:phase<1?0.4:1}} onClick={play2} disabled={playing||phase<1}>
          {playing&&phase>=1?<><ListeningBars color={sc}/>&nbsp;{countIn?"1·2·3·4·▶":"Playing..."}</>:<><span>▶</span> Play 2nd</>}
        </button>
      </div>
      <FeedbackToast correct={feedback?.ok} streak={feedback?.streak} visible={!!feedback}/>
      <div className="rhythm-visual">
        {[1,2,3,4].map(b=>(
          <div key={b} className={`beat-dot ${revealed&&String(b)===q.answer?"highlight":""}`}>{b}</div>
        ))}
      </div>
      {["same","1","2","3","4"].map(v=>(
        <button key={v} className={`mat-btn btn-answer ${selected===v?"selected":""} ${revealed&&v===q.answer?"correct":""} ${revealed&&selected===v&&v!==q.answer?"wrong":""}`}
          onClick={()=>choose(v)} disabled={phase<2}>
          {v==="same"?"Same":`Beat ${v}`}
        </button>
      ))}
      {revealed&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <button className="mat-btn btn-primary" onClick={next}>{qIdx<TOTAL-1?"Next Question":"See Results"}</button>
      </div>}
    </QuestionCard>
  );
}

// ============================================================
// RESULTS SCREEN
// ============================================================
function ResultsScreen({ sectionId, score, level, onBack, onRetry }) {
  const s = SECTIONS.find(x=>x.id===sectionId);
  const pct = Math.round((score/s.total)*100);
  const grade = pct>=90?"Excellent!":pct>=70?"Well Done!":pct>=50?"Good Effort":"Keep Practising";
  const lc = LEVEL_COLORS[level] || G.accent;
  return (
    <div className="card fade-in">
      <div className="card-inner" style={{textAlign:"center"}}>
        <div className="ornament" style={{justifyContent:"center",marginBottom:16}}><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
        <div style={{fontFamily:"Cinzel",fontSize:20,fontWeight:700,color:s.color,marginBottom:6,letterSpacing:"0.1em"}}>{s.label} Complete</div>
        <span className="level-tag" style={{color:lc,borderColor:lc,background:`${lc}18`}}>{level}</span>
        <div style={{fontSize:52,fontFamily:"Cinzel",fontWeight:700,color:G.text,margin:"20px 0 4px"}}>
          {score}<span style={{fontSize:22,color:G.muted}}>/{s.total}</span>
        </div>
        <div style={{fontSize:15,color:G.muted,marginBottom:16}}>{grade} · {pct}%</div>
        <div className="progress-bar" style={{height:5}}>
          <div className="progress-fill" style={{width:`${pct}%`,background:s.color}}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:22}}>
          <button className="mat-btn btn-ghost" style={{flex:1}} onClick={onBack}>Back to Menu</button>
          <button className="mat-btn btn-primary" style={{flex:1}} onClick={onRetry}>Try Again</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// FULL TEST — level selector before starting
// ============================================================
function FullTestLevelSelect({ onStart }) {
  const [level, setLevel] = useState("Medium");
  return (
    <div className="card fade-in" style={{maxWidth:420}}>
      <div className="card-inner" style={{textAlign:"center"}}>
        <div className="ornament" style={{justifyContent:"center",marginBottom:12}}><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
        <div style={{fontFamily:"Cinzel",fontSize:20,color:G.accent,marginBottom:6,letterSpacing:"0.1em"}}>Full Test</div>

        <div style={{fontSize:12,color:G.muted,marginBottom:20,textAlign:"left",lineHeight:1.8}}>

// FULL TEST RESULTS
// ============================================================
function FullTestResults({ sectionScores, level, onBack, onRetry }) {
  const total = SECTIONS.reduce((a,s)=>a+(sectionScores[s.id]||0),0);
  const pct = Math.round((total/FULL_TOTAL)*100);
  const grade = pct>=90?"Excellent!":pct>=75?"Well Done!":pct>=55?"Good Effort":"Keep Practising";
  const lc = LEVEL_COLORS[level] || G.accent;
  return (
    <div className="card fade-in">
      <div className="card-inner" style={{textAlign:"center"}}>
        <div className="ornament" style={{justifyContent:"center",marginBottom:16}}><div className="ornament-line"/><div className="ornament-diamond"/><div className="ornament-line"/></div>
        <div style={{fontFamily:"Cinzel",fontSize:20,fontWeight:700,color:G.accent,marginBottom:6,letterSpacing:"0.1em"}}>Full Test Complete</div>
        <span className="level-tag" style={{color:lc,borderColor:lc,background:`${lc}18`}}>{level}</span>
        <div style={{fontSize:52,fontFamily:"Cinzel",fontWeight:700,color:G.text,margin:"20px 0 4px"}}>
          {total}<span style={{fontSize:22,color:G.muted}}>/{FULL_TOTAL}</span>
        </div>
        <div style={{fontSize:15,color:G.muted,marginBottom:16}}>{grade} · {pct}%</div>
        <div className="progress-bar" style={{height:5}}>
          <div className="progress-fill" style={{width:`${pct}%`,background:G.accent}}/>
        </div>
        <div style={{margin:"20px 0",textAlign:"left"}}>
          {SECTIONS.map(s=>{
            const sc = sectionScores[s.id]||0;
            const sp = Math.round((sc/s.total)*100);
            return (
              <div key={s.id} className="full-result-row">
                <span style={{color:s.color,fontFamily:"Cinzel",fontSize:12}}>{s.icon} {s.label}</span>
                <span style={{fontSize:13,color:G.text}}>{sc}/{s.total} <span style={{color:G.muted}}>({sp}%)</span></span>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="mat-btn btn-ghost" style={{flex:1}} onClick={onBack}>Back to Menu</button>
          <button className="mat-btn btn-primary" style={{flex:1}} onClick={onRetry}>Try Again</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ADMIN DASHBOARD
// ============================================================
function AdminDashboard({ onBack }) {
  const [users, setUsers] = useState({});
  const [scores, setScores] = useState({});
  const [newUser, setNewUser] = useState("");
  const [newPass, setNewPass] = useState("");
  const [addError, setAddError] = useState("");
  const [addSuccess, setAddSuccess] = useState("");
  const [delConfirm, setDelConfirm] = useState(null); // username pending delete

  async function refresh() {
    setUsers(await getUsers()); setScores(await getScores());
  }
  useEffect(()=>{ refresh(); },[]);

  const students = Object.keys(users).filter(u=>!users[u].isAdmin);

  async function addStudent() {
    setAddError(""); setAddSuccess("");
    const u = newUser.trim().toLowerCase();
    const p = newPass.trim();
    if (!u || !p) { setAddError("Please fill in both fields."); return; }
    if (u.length < 2) { setAddError("Username must be at least 2 characters."); return; }
    if (p.length < 4) { setAddError("Password must be at least 4 characters."); return; }
    const all = await getUsers();
    if (all[u]) { setAddError(`Username "${u}" already exists.`); return; }
    all[u] = { password: p, isAdmin: false };
    await saveUsers(all);
    setNewUser(""); setNewPass("");
    setAddSuccess(`Account "${u}" created!`);
    await refresh();
    setTimeout(()=>setAddSuccess(""), 3000);
  }

  async function deleteStudent(username) {
    const all = await getUsers();
    delete all[username];
    await saveUsers(all);
    const allScores = await getScores();
    delete allScores[username];
    await saveScores(allScores);
    setDelConfirm(null);
    await refresh();
  }

  async function resetPassword(username, newPassword) {
    const all = await getUsers();
    all[username].password = newPassword;
    await saveUsers(all);
    await refresh();
  }

  return (
    <div className="fade-in" style={{width:"100%",maxWidth:900}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,width:"100%"}}>
        <div>
          <div style={{fontFamily:"Cinzel",fontSize:22,fontWeight:700,color:G.accent}}>Teacher Dashboard</div>
          <div style={{fontSize:12,color:G.muted,marginTop:2}}>{students.length} student{students.length!==1?"s":""} registered</div>
        </div>
        <button className="mat-btn btn-ghost" onClick={onBack}>← Back</button>
      </div>

      {/* Add Student Panel */}
      <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:4,padding:"20px 24px",marginBottom:24}}>
        <div style={{fontFamily:"Cinzel",fontSize:13,letterSpacing:"0.1em",color:G.accent,marginBottom:14}}>Add New Student</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:10,alignItems:"start"}}>
          <div>
            <input className="mat-input" style={{marginBottom:0}} placeholder="Username"
              value={newUser} onChange={e=>setNewUser(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addStudent()}/>
          </div>
          <div>
            <input className="mat-input" style={{marginBottom:0}} placeholder="Password (min 4 chars)"
              value={newPass} onChange={e=>setNewPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addStudent()}/>
          </div>
          <button className="mat-btn btn-primary" style={{whiteSpace:"nowrap",height:46}} onClick={addStudent}>
            + Add
          </button>
        </div>
        {addError   && <div style={{fontSize:12,color:"#c97a7a",marginTop:8}}>{addError}</div>}
        {addSuccess && <div style={{fontSize:12,color:"#7ab87a",marginTop:8}}>✓ {addSuccess}</div>}
      </div>

      {/* Delete confirm modal */}
      {delConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:4,padding:32,maxWidth:360,width:"90%",textAlign:"center"}}>
            <div style={{fontFamily:"Cinzel",fontSize:16,color:"#c97a7a",marginBottom:12}}>Delete Account</div>
            <div style={{fontSize:14,color:G.text,marginBottom:8}}>Remove <strong style={{color:G.accent}}>{delConfirm}</strong>?</div>
            <div style={{fontSize:12,color:G.muted,marginBottom:24}}>This will also delete all their scores. This cannot be undone.</div>
            <div style={{display:"flex",gap:10}}>
              <button className="mat-btn btn-ghost" style={{flex:1}} onClick={()=>setDelConfirm(null)}>Cancel</button>
              <button className="mat-btn" style={{flex:1,background:"#c97a7a",color:"#0e0c09"}} onClick={()=>deleteStudent(delConfirm)}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Student list */}
      {students.length===0
        ? <div style={{color:G.muted,textAlign:"center",padding:40,border:`1px dashed ${G.border}`,borderRadius:4}}>
            No students yet — add one above.
          </div>
        : <div className="dash-grid">
            {students.map(u=>{
              const sc = scores[u]||{};
              const total = SECTIONS.reduce((a,s)=>a+(sc[s.id]?.best||0),0);
              return (
                <div key={u} className="dash-tile" style={{position:"relative"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                    <div className="student-name">{u}</div>
                    <button onClick={()=>setDelConfirm(u)}
                      style={{background:"transparent",border:"none",color:G.muted,cursor:"pointer",fontSize:14,lineHeight:1,padding:"2px 4px"}}
                      title="Delete student">✕</button>
                  </div>
                  <div style={{fontSize:11,color:G.muted,marginBottom:10}}>Best total: {total}/{FULL_TOTAL}</div>
                  {SECTIONS.map(s=>(
                    <div key={s.id} className="score-row">
                      <span style={{color:s.color}}>{s.label}</span>
                      <span className="score-val">{sc[s.id]?.best!=null?`${sc[s.id].best}/${s.total}`:"—"}</span>
                    </div>
                  ))}
                  <div style={{marginTop:10,height:2,background:G.border}}>
                    <div style={{width:`${(total/FULL_TOTAL)*100}%`,height:"100%",background:G.accent}}/>
                  </div>
                  <ResetPassword username={u} onReset={resetPassword}/>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

function ResetPassword({ username, onReset }) {
  const [open, setOpen] = useState(false);
  const [pw, setPw] = useState("");
  const [msg, setMsg] = useState("");
  function submit() {
    if (pw.length < 4) { setMsg("Min 4 chars"); return; }
    onReset(username, pw); setPw(""); setMsg("✓ Updated"); setOpen(false);
    setTimeout(()=>setMsg(""),2000);
  }
  return (
    <div style={{marginTop:10}}>
      {!open
        ? <button onClick={()=>setOpen(true)}
            style={{background:"transparent",border:`1px solid ${G.border}`,color:G.muted,borderRadius:3,padding:"4px 10px",fontSize:10,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase",width:"100%"}}>
            Reset Password
          </button>
        : <div style={{display:"flex",gap:6,marginTop:4}}>
            <input className="mat-input" style={{marginBottom:0,padding:"6px 10px",fontSize:12,flex:1}}
              placeholder="New password" value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <button className="mat-btn btn-primary" style={{padding:"6px 12px",fontSize:11}} onClick={submit}>Save</button>
            <button className="mat-btn btn-ghost" style={{padding:"6px 10px",fontSize:11}} onClick={()=>{setOpen(false);setPw("");}}>✕</button>
          </div>
      }
      {msg && <div style={{fontSize:11,color:"#7ab87a",marginTop:4}}>{msg}</div>}
    </div>
  );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState("auth");
  const [activeSection, setActiveSection] = useState(null);
  const [activeLevel, setActiveLevel] = useState("Medium");
  const [lastScore, setLastScore] = useState(null);
  const [scores, setScores] = useState({});
  const [ftLevel, setFtLevel] = useState("Medium");
  const [ftSectionIdx, setFtSectionIdx] = useState(0);
  const [ftScores, setFtScores] = useState({});
  const [sessionStats, setSessionStats] = useState({});

  function getStat(sid) { return sessionStats[sid] || { correct:0, attempted:0, streak:0 }; }
  function updateStat(sid, wasCorrect) {
    setSessionStats(prev => {
      const s = prev[sid] || { correct:0, attempted:0, streak:0 };
      return { ...prev, [sid]: {
        correct:   s.correct   + (wasCorrect?1:0),
        attempted: s.attempted + 1,
        streak:    wasCorrect  ? s.streak+1 : 0,
      }};
    });
  }
  function resetStat(sid) {
    setSessionStats(prev => ({ ...prev, [sid]: { correct:0, attempted:0, streak:0 } }));
  }

  async function loadScores() { setScores(await getScores()); }
  async function handleLogin(u) { setUser(u); await loadScores(); setView("menu"); }
  function handleSelectSection(id) { setActiveSection(id); setView("section"); }
  function handleStartFullTest(level) { setFtLevel(level); setFtSectionIdx(0); setFtScores({}); setView("fulltest"); }

  async function saveSectionScore(sectionId, score) {
    const all = await getScores();
    if (!all[user.username]) all[user.username] = {};
    const prev = all[user.username][sectionId];
    all[user.username][sectionId] = { best: Math.max(score, prev?.best||0), last: score };
    await saveScores(all); setScores(all);
  }

  async function handleSectionDone(score) {
    setLastScore(score);
    await saveSectionScore(activeSection, score);
    setView("result");
  }

  async function handleFullTestSectionDone(score) {
    const sid = SECTIONS[ftSectionIdx].id;
    setFtScores(prev => ({ ...prev, [sid]: score }));
    await saveSectionScore(sid, score);
    if (ftSectionIdx < SECTIONS.length-1) { setFtSectionIdx(i=>i+1); }
    else { setView("fullresult"); }
  }

  const curFt = SECTIONS[ftSectionIdx]?.id;

  const sectionProps = (sid) => ({
    onHome: ()=>setView("menu"),
    stat: getStat(sid),
    onAnswer: w=>updateStat(sid,w),
    onReset: ()=>resetStat(sid),
  });

  return (
    <>
      <style>{css}</style>
      <div className="mat-root">
        <Stars/>
        {view==="auth"   && <AuthScreen onLogin={handleLogin}/>}
        {view==="menu"   && <SectionSelect user={user} scores={scores} onSelect={handleSelectSection}
            onFullTest={()=>setView("ftlevel")} onDashboard={()=>setView("admin")} onLogout={()=>{setUser(null);setView("auth");}}/>}
        {view==="ftlevel" && <FullTestLevelSelect onStart={lv=>{handleStartFullTest(lv);}}/>}

        {view==="section" && activeSection==="pitch"   && <PitchSection   {...sectionProps("pitch")}   onDone={handleSectionDone} initialLevel={activeLevel}/>}
        {view==="section" && activeSection==="melody"  && <MelodySection  {...sectionProps("melody")}  onDone={handleSectionDone} initialLevel={activeLevel}/>}
        {view==="section" && activeSection==="texture" && <TextureSection {...sectionProps("texture")} onDone={handleSectionDone} initialLevel={activeLevel}/>}
        {view==="section" && activeSection==="rhythm"  && <RhythmSection  {...sectionProps("rhythm")}  onDone={handleSectionDone} initialLevel={activeLevel}/>}
        {view==="result"  && <ResultsScreen sectionId={activeSection} score={lastScore} level={activeLevel}
            onBack={()=>setView("menu")} onRetry={()=>setView("section")}/>}

        {view==="fulltest" && curFt==="pitch"   && <PitchSection   key="ft-p" {...sectionProps("pitch")}   onDone={handleFullTestSectionDone} isFullTest ftSectionIdx={ftSectionIdx} initialLevel={ftLevel}/>}
        {view==="fulltest" && curFt==="melody"  && <MelodySection  key="ft-m" {...sectionProps("melody")}  onDone={handleFullTestSectionDone} isFullTest ftSectionIdx={ftSectionIdx} initialLevel={ftLevel}/>}
        {view==="fulltest" && curFt==="texture" && <TextureSection key="ft-t" {...sectionProps("texture")} onDone={handleFullTestSectionDone} isFullTest ftSectionIdx={ftSectionIdx} initialLevel={ftLevel}/>}
        {view==="fulltest" && curFt==="rhythm"  && <RhythmSection  key="ft-r" {...sectionProps("rhythm")}  onDone={handleFullTestSectionDone} isFullTest ftSectionIdx={ftSectionIdx} initialLevel={ftLevel}/>}
        {view==="fullresult" && <FullTestResults sectionScores={ftScores} level={ftLevel}
            onBack={()=>setView("menu")} onRetry={()=>setView("ftlevel")}/>}

        {view==="admin"  && <AdminDashboard onBack={()=>setView("menu")}/>}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
